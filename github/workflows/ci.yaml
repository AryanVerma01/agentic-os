name: Basic CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- API APPLICATION JOB ---
  api-ci:
    name: API (Lint & Type-Check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Automatically caches node_modules dependencies

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --prefix apps/api

      - name: Run Type-Check
        run: npm run typecheck --prefix apps/api

  # --- WEB APPLICATION JOB ---
  web-ci:
    name: Web (Lint & Type-Check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --prefix apps/web

      - name: Run Type-Check
        run: npm run typecheck --prefix apps/web
